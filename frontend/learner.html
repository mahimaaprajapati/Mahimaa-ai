<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Learning Universe | Mahimaa</title>

    <link rel="stylesheet" href="/src/learner/learner.css">

</head>

<body>

    <!-- ========================= -->
    <!-- Universe -->
    <!-- ========================= -->

    <main id="learning-universe">

        <!-- Background Stars -->
        <div id="stars"></div>

        <!-- Animated Glow -->
        <div id="universe-glow"></div>

        <!-- Center Orb -->
        <section id="core">

            <div id="core-orb"></div>

            <h1>Curiosity</h1>

            <p id="core-subtitle">
    Every project begins with something I don't know.
</p>

        </section>

        <!-- Floating Learning Nodes -->
        <div id="learning-map">

            <button class="node" data-topic="currently">
                Currently Exploring
            </button>

            <button class="node" data-topic="cs">
                Computer Science
            </button>

            <button class="node" data-topic="ai">
                AI & LLMs
            </button>

            <button class="node" data-topic="robotics">
                Robotics
            </button>

            <button class="node" data-topic="research">
                Research Journey
            </button>

            <button class="node" data-topic="books">
                Books & Papers
            </button>

            <button class="node" data-topic="lessons">
                Lessons from Building
            </button>

            <button class="node" data-topic="questions">
                Questions I'm Chasing
            </button>

        </div>

        <!-- Information Panel -->

       <aside id="info-panel">

    <div id="panel-header">

        <h2 id="panel-title">
            Curiosity
        </h2>

        <button id="close-panel">
            ✕
        </button>

    </div>

    <div id="panel-content">

        <p>

            Select a topic to explore how I learn.

        </p>

    </div>

</aside>


        <!-- Back Button -->

        <button id="back-button">

            ← Back

        </button>

    </main>

    <script type="module" src="/src/learner/learner.ts"></script>

</body>

</html>
