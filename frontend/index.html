<html lang="en">

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<body>

<div id="loading-screen">

  <!-- Floating blobs -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <!-- Terminal -->
  <div id="terminal">
    <p id="terminal-text"></p>
  </div>

  <!-- Center content -->
  <div class="loader-container">
    <h1 class="title">Mahimaa AI</h1>

    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>

    <p id="progress-text">Loading 0%</p>

    <button id="enter-btn">Enter My World</button>
  </div>

</div>


<!-- Avatar Scene -->

<div id="avatar-scene">
  <canvas id="webgl"></canvas>
</div>
<div id="dialogueBox">
  <p id="dialogueText"></p>
</div>
<div id="floating-labels">

    <div class="label recruiter">

        RECRUITER

    </div>

    <div class="label learner">

        LEARNER

    </div>

    <div class="label developer">

        FELLOW DEVELOPER

        RANDOM STALKER

    </div>

</div>
